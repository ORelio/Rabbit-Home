# Define a list of remote controlled plugs
# This module implements protocol for plugs having 5 "channel" switches and 5 "ABCDE" switches

# Most 433Mhz sockets having this config should work fine with this module
# (1) Note that the "codesend" command must be installed - https://github.com/ninjablocks/433Utils
# (2) Note that this module can address plugs having more than one "ABCDE" switch set,
#     unlike the stock remote control provided with the plugs.

# [PlugName]             # Name of the plug for referring from scenarios
# Channel=01010          # Channel for addressing the 433MHz plugs ("channel" switches / System code)
# Address=A              # ADCDE switches on the plug (Unit code). Usually one at once, but see (2) above.
# Hidden=False           # Optional. Hide from Web UI (default: False)

# Example A: Basic device definition

[TV]
Channel=01010
Address=A
Hidden=False

# Example B: Lamp on a socket, with Hidden=True because it should be accessed through an associated Light. 

[Lamp]
Channel=01010
Address=B
Hidden=True

# Example C: Hidden=False is optional, default is False

[Heater]
Channel=01010
Address=C

# Example D: Setting several A B C D E channel switches at once on a plug, see (2) above.

[Test]
Channel=01010
Address=ABC
